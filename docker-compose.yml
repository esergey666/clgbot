services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clg-label-bot
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      OCR_ENGINE: "${OCR_ENGINE:-rapidocr}"
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
